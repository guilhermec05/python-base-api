version: '3.9'
services:
  db:
    image: postgis/postgis:latest  # Or specify version, e.g., postgis/postgis:16-3.4
    container_name: postgis_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345678  
      POSTGRES_DB: spatial_db
    ports:
      - "5435:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data

volumes:
  postgis_data:
